      - name: Run AnyDesk Setup (capture)
        shell: powershell
        run: |
          if (Test-Path show.bat) {
            cmd /c "call show.bat" 2>&1 | Tee-Object -FilePath show_output.txt
          } else {
            echo show.bat nahi mili!
            exit 1
          }

      - name: Write credentials to Firebase RTDB
        shell: powershell
        env:
          FIREBASE_SA_JSON: ${{ secrets.FIREBASE_SA_JSON }}
          FIREBASE_RTDB_URL: ${{ secrets.FIREBASE_RTDB_URL }}
        run: |
          $text = Get-Content -Raw -Path show_output.txt

          $id = [regex]::Match($text,'Windows\s*Cloud\s*(?:PC\s*)?ID\s*is\s*:\s*`?(\d[\d\s]{5,})`?','IgnoreCase').Groups[1].Value
          $id = ($id -replace '\s+','').Trim()

          $pw = [regex]::Match($text,'Windows\s*Cloud\s*(?:PC\s*)?Password(?:\s+is)?\s*:\s*([^\r\n]+)','IgnoreCase').Groups[1].Value.Trim()

          if (-not $id -or -not $pw) {
            Write-Host "Credentials not found yet."
            exit 0
          }

          $sa = $env:FIREBASE_SA_JSON | ConvertFrom-Json
          $now = [int][DateTimeOffset]::UtcNow.ToUnixTimeSeconds()

          Add-Type -AssemblyName System.Security
          $header = @{ alg = "RS256"; typ = "JWT" } | ConvertTo-Json -Compress
          $claims = @{
            iss = $sa.client_email
            scope = "https://www.googleapis.com/auth/firebase.database https://www.googleapis.com/auth/userinfo.email"
            aud = "https://oauth2.googleapis.com/token"
            iat = $now
            exp = $now + 3600
          } | ConvertTo-Json -Compress

          function b64url([byte[]]$b){ [Convert]::ToBase64String($b).TrimEnd('=').Replace('+','-').Replace('/','_') }
          $u = (b64url([Text.Encoding]::UTF8.GetBytes($header))) + "." + (b64url([Text.Encoding]::UTF8.GetBytes($claims)))

          $rsa = [System.Security.Cryptography.RSA]::Create()
          $rsa.ImportFromPem($sa.private_key)
          $sig = $rsa.SignData([Text.Encoding]::UTF8.GetBytes($u), [System.Security.Cryptography.HashAlgorithmName]::SHA256, [System.Security.Cryptography.RSASignaturePadding]::Pkcs1)
          $jwt = $u + "." + (b64url($sig))

          $tokenResp = Invoke-RestMethod -Method Post -Uri "https://oauth2.googleapis.com/token" -ContentType "application/x-www-form-urlencoded" -Body ("grant_type=urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Ajwt-bearer&assertion=" + $jwt)
          $access = $tokenResp.access_token

          $body = @{
            pc_id = $id
            pc_password = $pw
            ts = $now
            repo = $env:GITHUB_REPOSITORY
          } | ConvertTo-Json -Compress

          $url = ($env:FIREBASE_RTDB_URL.TrimEnd('/')) + "/runs/$($env:GITHUB_RUN_ID)/credentials.json?access_token=$access"
          Invoke-RestMethod -Method Put -Uri $url -ContentType "application/json" -Body $body
